x-common-env: &common-env
  environment:
    DATABASE_URL:          ${DATABASE_URL}
    REDIS_URL:             ${REDIS_URL}
    MINIO_ENDPOINT:        minio:9000
    MINIO_ACCESS_KEY:      ${MINIO_ACCESS_KEY}
    MINIO_SECRET_KEY:      ${MINIO_SECRET_KEY}
    MINIO_BUCKET_SOURCES:  ${MINIO_BUCKET_SOURCES:-clipflow-sources}
    MINIO_BUCKET_CLIPS:    ${MINIO_BUCKET_CLIPS:-clipflow-clips}
    MINIO_BUCKET_SRT:      ${MINIO_BUCKET_SRT:-clipflow-srt}
    MINIO_BUCKET_THUMBS:   ${MINIO_BUCKET_THUMBS:-clipflow-thumbnails}
    TOKEN_ENCRYPTION_KEY:  ${TOKEN_ENCRYPTION_KEY}
    SESSION_COOKIE_SECRET: ${SESSION_COOKIE_SECRET}
    ANTHROPIC_API_KEY:     ${ANTHROPIC_API_KEY}
    OPENAI_API_KEY:        ${OPENAI_API_KEY:-}
    NODE_ENV:              ${NODE_ENV:-development}

services:
  # ── Postgres 18 ───────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       clipflow
      POSTGRES_USER:     clipflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      # Postgres 18+: mount at /var/lib/postgresql (it places data under a version-subdir).
      - ./data/postgres:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clipflow -d clipflow"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Redis 7.4.x (pin minor — AGPLv3 concern on v8+) ──────────
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO ────────────────────────────────────────────────────
  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./data/minio:/data
    ports:
      - "9000:9000"
      - "9011:9001"   # console — remapped to avoid Laravel Herd on host:9001
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO init (runs once, creates buckets) ───────────────────
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/init-minio.sh"]
    volumes:
      - ./init-minio.sh:/init-minio.sh:ro
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    restart: "no"

  # ── API (Fastify) ─────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3001:3001"
    volumes:
      - /tmp/clipflow:/tmp/clipflow

  # ── Worker (BullMQ — scale horizontally) ─────────────────────
  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.worker
    restart: unless-stopped
    <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      replicas: 2
    volumes:
      - /tmp/clipflow:/tmp/clipflow

  # ── Web (Next.js 16) ─────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    depends_on:
      - api
    ports:
      - "3000:3000"

  # ── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web

volumes:
  {}
